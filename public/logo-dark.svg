<svg xmlns="http://www.w3.org/2000/svg" width="200" height="52" viewBox="0 0 200 52" role="img" aria-label="Bhutan Echoes">
  <!-- Mountain outline -->
  <polygon points="28,46 46,8 64,46" fill="none" stroke="#f5efe0" stroke-width="2" stroke-linejoin="round"/>
  <!-- Snow cap -->
  <polygon points="46,8 53,26 46,22 39,26" fill="white"/>
  <!-- Gold base line -->
  <line x1="28" y1="46" x2="64" y2="46" stroke="#C8860A" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Wordmark -->
  <text x="76" y="26" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="700" fill="#f5efe0">Bhutan</text>
  <text x="76" y="45" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="300" fill="#f5efe0">Echoes</text>
</svg>
